<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropy - Order & Chaos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
          font-family: 'Inter', sans-serif;
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background: #000;
          overflow: hidden;
          height: 100vh;
        }

        /* Animations */
        @keyframes float-up {
          0% {
            opacity: 0;
            transform: translateY(20px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes glow {
          0%, 100% {
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
          }
          50% {
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.6));
          }
        }

        .canvas-container {
          position: relative;
          width: 100vw;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .canvas-glow {
          animation: glow 3s ease-in-out infinite;
        }

        .title-float {
          animation: float-up 1s ease-out 0.5s both;
        }

        .subtitle-glow {
          animation: glow 4s ease-in-out infinite;
          animation-delay: 1s;
        }

        /* Responsive Canvas */
        @media (max-width: 768px) {
          canvas {
            max-width: 90vw !important;
            max-height: 90vh !important;
          }
        }
    </style>
</head>
<body class="bg-black text-white">
<div class="canvas-container">
    <!-- Main Canvas -->
    <canvas
            id="entropyCanvas"
            class="rounded-2xl canvas-glow shadow-2xl border border-white/10 max-w-4xl max-h-[80vh] w-full h-auto"
    ></canvas>

    <!-- Overlay Content -->
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <div class="text-center px-8 max-w-2xl title-float">
            <h1 class="text-5xl md:text-5xl font-black bg-gradient-to-r from-white via-gray-200 to-white/70 bg-clip-text text-transparent mb-4 drop-shadow-2xl">
                V HERE
            </h1>
            <div class="subtitle-glow">
                <p class="text-xl md:text-2xl font-light italic text-white/80 tracking-wide leading-relaxed">
                    "MOTION PARTICLES  — <span class="text-white font-medium">digital mouse in motion.</span>"
                </p>
                <div class="flex items-center justify-center mt-8 space-x-4 opacity-70">
                    <div class="w-2 h-2 bg-white/50 rounded-full animate-ping"></div>
                    <span class="text-sm font-mono tracking-widest uppercase">live simulation</span>
                    <div class="w-2 h-2 bg-white/50 rounded-full animate-ping" style="animation-delay: 0.5s;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex gap-4 pointer-events-auto">
        <button id="pauseBtn" class="px-6 py-3 bg-white/10 backdrop-blur-lg border border-white/30 rounded-xl text-white/90 hover:bg-white/20 hover:border-white/50 transition-all duration-300 font-medium shadow-xl hover:shadow-2xl hover:scale-105">
            ⏸️ Pause
        </button>
        <button id="resetBtn" class="px-6 py-3 bg-gradient-to-r from-white/20 to-white/10 backdrop-blur-lg border border-white/20 rounded-xl text-white font-medium shadow-xl hover:shadow-2xl hover:scale-105 hover:from-white/30 transition-all duration-300">
            🔄 Reset
        </button>
    </div>
</div>

<script>
    class Entropy {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.size = 0;
        this.dpr = window.devicePixelRatio || 1;
        this.particles = [];
        this.isPaused = false;
        this.animationId = null;
        this.time = 0;

        this.init();
        this.resize();
        this.animate();
        this.setupEventListeners();
      }

      init() {
        // Particle grid setup
        this.gridSize = 28;
        this.spacing = 0;
        this.particleColor = '#ffffff';
      }

      resize() {
        const rect = this.canvas.getBoundingClientRect();
        const size = Math.min(rect.width, rect.height * 0.9);

        this.canvas.width = size * this.dpr;
        this.canvas.height = size * this.dpr;
        this.canvas.style.width = `${size}px`;
        this.canvas.style.height = `${size}px`;
        this.ctx.scale(this.dpr, this.dpr);

        this.size = size / this.dpr;
        this.spacing = this.size / this.gridSize;
        this.createParticles();
      }

      createParticles() {
        this.particles = [];

        // Create ordered particles (left half) and chaotic particles (right half)
        for (let i = 0; i < this.gridSize; i++) {
          for (let j = 0; j < this.gridSize; j++) {
            const x = this.spacing * i + this.spacing / 2;
            const y = this.spacing * j + this.spacing / 2;
            const order = x < this.size / 2; // Left: ordered, Right: chaotic
            this.particles.push(new Particle(x, y, order, this.size));
          }
        }
      }
    }

    class Particle {
      constructor(x, y, order, bounds) {
        this.x = x;
        this.y = y;
        this.originalX = x;
        this.originalY = y;
        this.size = 1.8;
        this.order = order;
        this.bounds = bounds;
        this.velocity = {
          x: (Math.random() - 0.5) * 1.5,
          y: (Math.random() - 0.5) * 1.5
        };
        this.influence = 0;
        this.neighbors = [];
      }

      update(particles) {
        if (this.order) {
          // Ordered particle behavior
          const dx = this.originalX - this.x;
          const dy = this.originalY - this.y;

          // Calculate chaos influence from neighbors
          const chaosInfluence = { x: 0, y: 0 };
          this.neighbors.forEach(neighbor => {
            if (!neighbor.order) {
              const distance = Math.hypot(this.x - neighbor.x, this.y - neighbor.y);
              const strength = Math.max(0, 1 - distance / 80);
              chaosInfluence.x += neighbor.velocity.x * strength * 0.3;
              chaosInfluence.y += neighbor.velocity.y * strength * 0.3;
              this.influence = Math.max(this.influence, strength * 0.8);
            }
          });

          // Blend ordered restoration with chaos influence
          this.x += dx * 0.08 * (1 - this.influence) + chaosInfluence.x * this.influence * 0.5;
          this.y += dy * 0.08 * (1 - this.influence) + chaosInfluence.y * this.influence * 0.5;

          this.influence *= 0.98; // Influence decay
        } else {
          // Chaotic particle behavior
          this.velocity.x += (Math.random() - 0.5) * 0.8;
          this.velocity.y += (Math.random() - 0.5) * 0.8;
          this.velocity.x *= 0.96;
          this.velocity.y *= 0.96;

          this.x += this.velocity.x;
          this.y += this.velocity.y;

          // Boundary collision
          if (this.x < this.bounds / 2 || this.x > this.bounds) this.velocity.x *= -0.9;
          if (this.y < 0 || this.y > this.bounds) this.velocity.y *= -0.9;

          this.x = Math.max(this.bounds / 2, Math.min(this.bounds, this.x));
          this.y = Math.max(0, Math.min(this.bounds, this.y));
        }
      }

      findNeighbors(particles) {
        this.neighbors = particles.filter(other => {
          if (other === this) return false;
          const distance = Math.hypot(this.x - other.x, this.y - other.y);
          return distance < 90;
        });
      }

      draw(ctx) {
        const alpha = this.order ?
          Math.max(0.3, 0.9 - this.influence * 0.6) :
          0.85 + Math.sin(Date.now() * 0.01 + this.x) * 0.1;

        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        // Glow effect for influenced ordered particles
        if (this.order && this.influence > 0.1) {
          ctx.shadowColor = 'rgba(255, 255, 255, 0.6)';
          ctx.shadowBlur = 8;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
    }

    // Entropy instance methods
    Entropy.prototype.setupEventListeners = function() {
      window.addEventListener('resize', () => this.resize());

      document.getElementById('pauseBtn').addEventListener('click', (e) => {
        e.target.textContent = this.isPaused ? '⏸️ Pause' : '▶️ Resume';
        this.isPaused = !this.isPaused;
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        this.createParticles();
      });

      // Mouse interaction
      this.canvas.addEventListener('mousemove', (e) => {
        const rect = this.canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / this.dpr;
        const y = (e.clientY - rect.top) / this.dpr;

        this.particles.forEach(p => {
          const dist = Math.hypot(p.x - x, p.y - y);
          if (dist < 100) {
            p.velocity.x += (x - p.x) * 0.01;
            p.velocity.y += (y - p.y) * 0.01;
          }
        });
      });
    };

    Entropy.prototype.animate = function() {
      const animate = () => {
        if (this.isPaused) {
          this.animationId = requestAnimationFrame(animate);
          return;
        }

        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.size, this.size);

        // Update neighbors every 25 frames
        if (this.time % 25 === 0) {
          this.particles.forEach(p => p.findNeighbors(this.particles));
        }

        // Update and draw particles
        this.particles.forEach(p => {
          p.update(this.particles);
          p.draw(ctx);
        });

        // Draw dividing line
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 0.8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(this.size / 2, 0);
        ctx.lineTo(this.size / 2, this.size);
        ctx.stroke();

        // Labels
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.font = '14px Inter, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillText('ORDER', this.size / 4, 20);
        ctx.fillText('CHAOS', 3 * this.size / 4, 20);

        this.time++;
        this.animationId = requestAnimationFrame(animate);
      };

      animate();
    };

    // Initialize everything
    window.addEventListener('load', () => {
      const canvas = document.getElementById('entropyCanvas');
      new Entropy(canvas);
    });

    // Prevent zoom on iOS
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });
</script>
</body>
</html>
